<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Crop Recommendation</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="container">
        <h2>Crop Recommendation System</h2>

        <form action="/predict" method="post">
            <label>Nitrogen (N):</label>
            <input type="number" step="any" name="N" placeholder="N" required>

            <label>Phosphorus (P):</label>
            <input type="number" step="any" name="P" placeholder="P" required>

            <label>Potassium (K):</label>
            <input type="number" step="any" name="K" placeholder="K" required>

            <label>Temperature (°C):</label>
            <input type="number" step="any" name="temperature" placeholder="temperature in C" required>

            <label>Humidity (%):</label>
            <input type="number" step="any" name="humidity" placeholder="Humidity" required>

            <label>pH:</label>
            <input type="number" step="any" name="ph" placeholder="pH" required>

            <label>Rainfall (mm):</label>
            <input type="number" step="any" name="rainfall" placeholder="Rainfall in mm" required>

            <button type="submit">Predict Crop</button>
        </form>

        {% if prediction %}
            <div class="result">
                Recommended Crop: {{ prediction }}
            </div>
        {% endif %}
    </div>

</body>
</html>
